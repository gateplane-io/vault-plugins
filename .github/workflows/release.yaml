name: Release Plugins

on:
  push:
    tags:
      # run on release tags like: 'Y.M.D-release'
      - "*-release"
    paths:
      - '**.go'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  goreleaser:
    outputs:
      hashes: ${{ steps.binary.outputs.hashes }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: "1.24"
      - name: Get Release Versions from Git Tags
        run: |
          # Sets EnvVars like VERSION_policy_gate (used in GoReleaser config)
          scripts/plugin_versions.sh | grep -v '#' | sed 's/export //g' >> "$GITHUB_ENV"
          # Sets GoReleaser Tags EnvVars, to diff only between SemVer releases
          scripts/goreleaser_semver_tags.sh | grep -v '#' | sed 's/export //g' >> "$GITHUB_ENV"

      - name: Run GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@9c156ee8a17a598857849441385a2041ef570552 # v6.3.0
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # To announce the new release
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          # To not release the 'mock' plugin
          RELEASE: true

      - name: Parse GoReleaser checksum file
        id: binary
        env:
          ARTIFACTS: "${{ steps.goreleaser.outputs.artifacts }}"
        run: |
          set -euo pipefail

          checksum_file="$(
            jq -r '.[] | select(.type == "Checksum") | .path' <<< "$ARTIFACTS"
          )"

          if [[ -z "$checksum_file" || ! -f "$checksum_file" ]]; then
            echo "Could not find GoReleaser checksum file" >&2
            exit 1
          fi

          echo "checksum-file=$checksum_file" >> "$GITHUB_OUTPUT"
          echo "hashes=$(base64 -w0 < "$checksum_file")" >> "$GITHUB_OUTPUT"

          echo "Using checksum file: $checksum_file"
          cat "$checksum_file"

      - name: Generate build provenance attestations
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: ${{ steps.binary.outputs.checksum-file }}

  verification-with-github-attestations:
    needs:
      - goreleaser

    runs-on: ubuntu-latest

    permissions:
      contents: read
      attestations: read

    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FILENAME_PREFIX: gateplane-
        run: |
          set -euo pipefail

          gh \
            --repo "$GITHUB_REPOSITORY" \
            release download "$GITHUB_REF_NAME" \
            --pattern "${FILENAME_PREFIX}*"

      - name: Verify release assets
        env:
          CHECKSUMS: ${{ needs.goreleaser.outputs.hashes }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          checksums="$(base64 -d <<< "$CHECKSUMS")"

          while read -r digest filename; do
            [[ -n "$filename" ]] || continue

            echo "Verifying checksum for $filename"

            if [[ ! -f "$filename" ]]; then
              echo "Release asset not found: $filename" >&2
              exit 1
            fi

            actual_digest="$(sha256sum "$filename" | cut -d ' ' -f1)"

            if [[ "$actual_digest" != "$digest" ]]; then
              echo "Checksum mismatch for $filename" >&2
              exit 1
            fi

            echo "Verifying GitHub attestation for $filename"

            gh attestation verify "$filename" \
              --repo "$GITHUB_REPOSITORY"

          done <<< "$checksums"
